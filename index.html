:root{--bg0:#191915;--bg1:#2C2C2A;--bg2:#3A3A38;--bg3:#444441;--b:rgba(255,255,255,.08);--bs:rgba(255,255,255,.16);--t1:#FAF9F5;--t2:#888780;--t3:#5F5E5A;--ac:#4ade80;--acd:rgba(74,222,128,.15);--act:#060c08;--ok:#4ade80;--warn:#fb923c;--err:#f87171;--info:#38bdf8;--fd:'Barlow Condensed',sans-serif;--fb:'Barlow',sans-serif;--fm:'DM Mono',monospace;--r:10px;--rl:16px;--nh:60px;--hh:52px}

[data-theme=sepia]{--bg0:#181008;--bg1:#221808;--bg2:#2c2010;--bg3:#362818;--b:rgba(200,150,60,.14);--bs:rgba(200,150,60,.28);--t1:#f0d8a0;--t2:#b08040;--t3:#704820;--ac:#e0a030;--acd:rgba(224,160,48,.14);--act:#181008}
[data-theme=ocean]{--bg0:#040e1c;--bg1:#081628;--bg2:#0d2038;--bg3:#122848;--b:rgba(40,180,255,.1);--bs:rgba(40,180,255,.22);--t1:#b0e0ff;--t2:#5ab0d8;--t3:#286080;--ac:#30b8f8;--acd:rgba(48,184,248,.14);--act:#040e1c}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;font-family:var(--fb);background:var(--bg0);color:var(--t1);font-size:15px;-webkit-font-smoothing:antialiased}
button{cursor:pointer;border:none;background:none;color:inherit;font:inherit}
input,textarea,select{background:var(--bg2);border:1px solid var(--b);color:var(--t1);font:inherit;border-radius:var(--r);padding:9px 12px;width:100%;outline:none;transition:border-color .2s;font-size:14px}
input:focus,textarea:focus,select:focus{border-color:var(--ac)}
input[type=range]{padding:0;height:4px;accent-color:var(--ac);cursor:pointer;background:transparent;border:none}
input[type=number]{-moz-appearance:textfield}
input[type=number]::-webkit-outer-spin-button,input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:var(--bg3);border-radius:2px}
details>summary{list-style:none;cursor:pointer}details>summary::-webkit-details-marker{display:none}
#app{display:flex;flex-direction:column;height:100%;overflow:hidden}
#header{height:var(--hh);background:var(--bg1);border-bottom:1px solid var(--b);display:flex;align-items:center;padding:0 14px;gap:10px;flex-shrink:0;z-index:50}
#logo{font-family:var(--fd);font-size:22px;font-weight:800;letter-spacing:.08em;color:var(--ac);cursor:pointer;text-transform:uppercase}
#htitle{font-family:var(--fd);font-size:18px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;flex:1}
#pages{flex:1;overflow-y:auto;padding:14px;padding-bottom:calc(var(--nh) + 14px)}
#nav{height:var(--nh);background:var(--bg1);border-top:1px solid var(--b);display:flex;flex-shrink:0}
.ni{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;font-size:9px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--t3);font-family:var(--fd);padding:5px 2px;border:none;background:none;cursor:pointer;transition:color .2s}
.ni.on{color:var(--ac)}.ni .ico{font-size:18px;line-height:1}
.card{background:var(--bg1);border:1px solid var(--b);border-radius:var(--rl);padding:13px 15px;margin-bottom:10px}
.card2{background:var(--bg2)}.card-ac{background:var(--ac);color:var(--act);border-color:transparent}
.sl{font-family:var(--fd);font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--t3);margin-bottom:8px;margin-top:18px}
.sl:first-child{margin-top:0}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 18px;border-radius:var(--r);font-weight:700;font-size:13px;font-family:var(--fd);text-transform:uppercase;letter-spacing:.06em;transition:all .15s;cursor:pointer;border:none}
.btn-p{background:var(--ac);color:var(--act)}.btn-p:active{opacity:.85;transform:scale(.97)}
.btn-g{background:transparent;color:var(--t2);border:1px solid var(--bs)}.btn-g:active{background:var(--bg2)}
.btn-d{background:var(--err);color:#fff}.btn-sm{padding:6px 12px;font-size:11px}.btn-full{width:100%;justify-content:center}
.row{display:flex;align-items:center;gap:8px}.rowb{display:flex;align-items:center;justify-content:space-between;gap:8px}
.col{display:flex;flex-direction:column;gap:5px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;font-family:var(--fd);text-transform:uppercase;letter-spacing:.06em}
.b-ac{background:var(--acd);color:var(--ac)}.b-ok{background:rgba(74,222,128,.15);color:var(--ok)}
.b-warn{background:rgba(251,146,60,.15);color:var(--warn)}.b-err{background:rgba(248,113,113,.15);color:var(--err)}.b-info{background:rgba(56,189,248,.15);color:var(--info)}
.stat{background:var(--bg2);border-radius:var(--r);padding:10px;text-align:center}
.sv{font-family:var(--fd);font-size:22px;font-weight:700;color:var(--t1);line-height:1}
.sl2{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--t3);margin-top:3px;font-family:var(--fd)}
.slv{font-family:var(--fm);font-size:14px;font-weight:500;color:var(--ac);min-width:24px;text-align:right}
.chip{display:inline-flex;align-items:center;padding:5px 11px;border-radius:20px;border:1px solid var(--b);font-size:12px;color:var(--t2);cursor:pointer;transition:all .15s;font-family:var(--fd);text-transform:uppercase;letter-spacing:.05em;white-space:nowrap}
.chip.on{background:var(--acd);border-color:var(--ac);color:var(--ac)}.cwrap{display:flex;gap:6px;flex-wrap:wrap}
.exrow{display:flex;align-items:center;padding:9px 0;border-bottom:1px solid var(--b);gap:8px}

.exdet{font-size:12px;color:var(--t3);font-family:var(--fm);white-space:nowrap}
.sgrid{display:grid;grid-template-columns:22px 1fr 1fr 64px 32px;gap:4px;align-items:center;padding:5px 0;border-bottom:1px solid var(--b)}
.sgrid:last-child{border-bottom:none}.snum{font-family:var(--fm);font-size:11px;color:var(--t3);text-align:center}
.si{padding:7px 5px;font-size:13px;font-family:var(--fm);text-align:center;border-radius:8px}
.sdone{width:30px;height:30px;border-radius:50%;border:2px solid var(--bs);display:flex;align-items:center;justify-content:center;font-size:14px;transition:all .2s;cursor:pointer;flex-shrink:0}
.sdone.on{border-color:var(--ac);background:var(--ac);color:var(--act)}
.tsm{font-family:var(--fm);font-size:18px;color:var(--ac)}

.timer{font-family:var(--fd);font-size:60px;font-weight:700;color:var(--ac);text-align:center;line-height:1}

.pdot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.pdet{background:var(--bg2);border:1px solid var(--b);border-top:none;border-radius:0 0 var(--r) var(--r);padding:12px;margin-top:-5px;margin-bottom:5px}
.ov{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:100;display:flex;align-items:flex-end}
.sheet{background:var(--bg1);border-radius:20px 20px 0 0;padding:18px 15px 36px;width:100%;max-height:88vh;overflow-y:auto;border-top:1px solid var(--bs)}

.corrv{font-family:var(--fm);font-size:11px;color:var(--t3);width:30px;text-align:right}
.tgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}

.tsw:active{transform:scale(.95)}.tsw.on{border-color:var(--ac)}
.colors{display:flex;gap:7px;flex-wrap:wrap}
.csw{width:30px;height:30px;border-radius:50%;border:2px solid transparent;cursor:pointer;transition:transform .15s,border-color .15s}
.csw:active{transform:scale(.9)}.csw.on{border-color:var(--t1)}
.drag-handle{color:var(--t3);cursor:grab;padding:4px;font-size:18px;touch-action:none;user-select:none}
.drag-over{border-top:2px solid var(--ac) !important}
.streak{display:flex;gap:4px;flex-wrap:wrap}

.sdot.done{background:var(--ac)}.sdot.today{background:var(--ac);box-shadow:0 0 5px var(--ac)}

.divider{height:1px;background:var(--b);margin:10px 0}
.scroll-x{overflow-x:auto;white-space:nowrap;padding-bottom:4px}
.tab-bar{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:14px}

.tok{color:var(--ok)}.twarn{color:var(--warn)}.terr{color:var(--err)}
.bold{font-weight:600}.f11{font-size:11px}.f12{font-size:12px}.f13{font-size:13px}.f14{font-size:14px}.f18{font-size:18px}
.fdisp{font-family:var(--fd);font-size:22px;font-weight:700}
.mt4{margin-top:4px}.mt6{margin-top:6px}.mt8{margin-top:8px}.mt10{margin-top:10px}.mt12{margin-top:12px}.mt16{margin-top:16px}
.mb4{margin-bottom:4px}.mb6{margin-bottom:6px}.mb8{margin-bottom:8px}.mb10{margin-bottom:10px}.mb12{margin-bottom:12px}
.pbar{height:4px;background:var(--bg3);border-radius:2px;overflow:hidden}
.pfill{height:100%;background:var(--ac);border-radius:2px;transition:width .3s}
.zbar{display:flex;height:8px;border-radius:4px;overflow:hidden;gap:2px}
.z1{background:#6366f1}.z2{background:#22d3ee}.z3{background:#4ade80}.z4{background:#fb923c}.z5{background:#f87171}

.app-links{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
.app-link{display:flex;align-items:center;gap:6px;padding:8px 12px;border-radius:var(--r);border:1px solid var(--b);font-size:12px;color:var(--t2);text-decoration:none;cursor:pointer;background:var(--bg2)}

@keyframes pulse{0%,100%{opacity:1}50%{opacity:.45}}.pulse{animation:pulse 1.4s ease-in-out infinite}

</style>

const MIN_THRESH = 0.75; // 75% of target reps to consider progressing

// Get last session data for a given exercise id
function lastSessData(exId){
  for(const sess of S.sess){
    if(sess.type==='cardio')continue;
    const ex=(sess.exs||[]).find(e=>e.eid===exId);
    if(ex&&(ex.sets||[]).some(s=>s.kg||s.reps)){return{sess,ex};}
  }
  return null;
}

// Get last N sessions data for an exercise (for trend)
function historyData(exId, n=8){
  const results=[];
  for(const sess of S.sess){
    if(sess.type==='cardio')continue;
    const ex=(sess.exs||[]).find(e=>e.eid===exId);
    if(ex&&(ex.sets||[]).some(s=>s.kg)){
      const maxKg=Math.max(...(ex.sets||[]).filter(s=>s.kg).map(s=>+s.kg));
      const avgReps=Math.round((ex.sets||[]).filter(s=>s.reps).reduce((a,s)=>a+(+s.reps||0),0)/((ex.sets||[]).filter(s=>s.reps).length||1)*10)/10;
      results.push({date:sess.date,maxKg,avgReps,sets:ex.sets||[]});
      if(results.length>=n)break;
    }
  }
  return results.reverse(); // chronological
}

// Check if last session was successful (all sets ≥ 75% of target reps)
function wasSuccessful(exSets, targetReps){
  if(!exSets||!exSets.length)return true;
  const tgt=parseFloat(targetReps)||0;
  if(!tgt)return true;
  const done=exSets.filter(s=>s.reps||s.kg);
  if(!done.length)return true;
  return done.every(s=>(+s.reps||0)>= tgt*MIN_THRESH);
}

// Calculate objective for next session
function calcObjective(exId, targetRepsStr){
  const rate=PROG_RATE[exId];
  const last=lastSessData(exId);
  if(!last)return null; // no data yet

  const lastSets=last.ex.sets||[];
  const lastMaxKg=Math.max(...lastSets.filter(s=>s.kg).map(s=>+s.kg||0), 0);
  if(!lastMaxKg&&rate?.type==='weight')return null;

  const success=wasSuccessful(lastSets, targetRepsStr);
  const avgRepsLast=lastSets.filter(s=>s.reps).length?
    Math.round(lastSets.filter(s=>s.reps).reduce((a,s)=>a+(+s.reps||0),0)/lastSets.filter(s=>s.reps).length*10)/10 : 0;

  let nextKg=lastMaxKg;
  if(rate?.type==='weight' && success){
    // Count weeks since last session to determine how many progression steps
    nextKg=lastMaxKg+(rate.kg||2.5);
    // Round to nearest 0.5
    nextKg=Math.round(nextKg*2)/2;
  }

  // Indicator
  const hist=historyData(exId,4);
  let indicator='—';
  if(hist.length>=3){
    const kgs=hist.map(h=>h.maxKg).filter(Boolean);
    if(kgs.length>=2){
      const last2=kgs.slice(-2);
      const first2=kgs.slice(0,2);
      const avgRecent=last2.reduce((a,b)=>a+b,0)/last2.length;
      const avgOld=first2.reduce((a,b)=>a+b,0)/first2.length;
      if(avgRecent>avgOld+0.1)indicator='🟢';
      else if(avgRecent<avgOld-0.1)indicator='🔴';
      else indicator='🟡';
    }
  }

  return{lastMaxKg, lastSets, avgRepsLast, nextKg, success, indicator, hist};
}

const MICRO_LABELS={mg:'Magnésium',zn:'Zinc',fe:'Fer',ca:'Calcium',k:'Potassium',na:'Sodium',vd:'Vit. D',b12:'Vit. B12',vc:'Vit. C',va:'Vit. A',b6:'Vit. B6',b9:'Folates (B9)',ph:'Phosphore',se:'Sélénium'};

function calcFood(foodId, qty){
  const f=S.foods.find(x=>x.id===foodId);
  if(!f||!qty)return{cal:0,p:0,c:0,f:0,fi:0,...Object.fromEntries(MICRO_KEYS.map(k=>[k,0]))};
  const r=qty/100;
  const base={cal:Math.round((f.cal||0)*r*10)/10,p:Math.round((f.p||0)*r*10)/10,c:Math.round((f.c||0)*r*10)/10,f:Math.round((f.f||0)*r*10)/10,fi:Math.round((f.fi||0)*r*10)/10};
  MICRO_KEYS.forEach(mk=>{base[mk]=Math.round((f[mk]||0)*r*100)/100;});
  return base;
}
function calcDish(dish, grams){
  // grams = actual grams consumed (not %)
  const totalDishWeight=dish.totalWeight||(dish.ingredients||[]).reduce((a,i)=>a+(i.qty||0),0)||100;
  const totals={cal:0,p:0,c:0,f:0,fi:0,...Object.fromEntries(MICRO_KEYS.map(k=>[k,0]))};
  (dish.ingredients||[]).forEach(ing=>{
    const n=calcFood(ing.foodId,ing.qty);
    totals.cal+=n.cal;totals.p+=n.p;totals.c+=n.c;totals.f+=n.f;totals.fi+=n.fi;
    MICRO_KEYS.forEach(mk=>{totals[mk]+=n[mk]||0;});
  });
  const r=grams/totalDishWeight;
  const result={};
  Object.keys(totals).forEach(k=>{result[k]=Math.round(totals[k]*r*100)/100;});
  return result;
}

function calcBMR(w,h,age){
  // Harris-Benedict révisé (Mifflin-St Jeor)
  return Math.round(10*w + 6.25*h - 5*age + 5);
}

function getAJR(){
  const {profile,activity,weight:w,height:h,age,custom}=S.ajr;
  const af=ACTIVITY_FACTORS[activity]||1.725;
  const bmr=calcBMR(w,h,age);
  const tdee=Math.round(bmr*af);

  let kcal,prot,gluc,lip,fi;
  if(profile==='mass'){
    kcal=tdee+300;
    prot=Math.round(w*2);
    lip=Math.round(kcal*0.25/9);
    gluc=Math.round((kcal-prot*4-lip*9)/4);
    fi=35;
  } else if(profile==='trail'){
    kcal=tdee+150;
    prot=Math.round(w*1.6);
    gluc=Math.round(kcal*0.55/4);
    lip=Math.round(kcal*0.25/9);
    fi=40;
  } else if(profile==='public'){
    kcal=tdee;
    prot=Math.round(w*0.8);
    gluc=Math.round(kcal*0.5/4);
    lip=Math.round(kcal*0.3/9);
    fi=25;
  } else { // custom
    kcal=custom.kcal||tdee;
    prot=custom.prot||Math.round(w*1.8);
    gluc=custom.gluc||Math.round(kcal*0.45/4);
    lip=custom.lip||Math.round(kcal*0.25/9);
    fi=custom.fi||30;
  }

  // Micros AJR standards + sportif
  const micro={
    mg: profile==='mass'||profile==='trail'?420:375,   // mg
    zn: 11,         // mg
    fe: 9,          // mg (homme)
    ca: 1000,       // mg
    k:  3500,       // mg
    na: 2000,       // mg (limite)
    vd: 15,         // µg
    b12: 2.4,       // µg
    vc: profile==='trail'?120:110, // mg
    va: 900,        // µg
    b6: 1.7,        // mg
    b9: 400,        // µg
    ph: 700,        // mg
    se: 55,         // µg
  };

  return{kcal,prot,gluc,lip,fi,...micro};
}

// Today's nutrition totals including supplements
function getTodayTotals(){
  // Read directly from S.nutri — don't call gnl() to avoid creating empty logs
  const log=S.nutri.find(n=>n.date===today())||{meals:[],supps_taken:[]};
  const totals={cal:0,p:0,c:0,f:0,fi:0,...Object.fromEntries(MICRO_KEYS.map(k=>[k,0]))};
  (log.meals||[]).forEach(m=>(m.foods||[]).forEach(fd=>{
    totals.cal+=+fd.cal||0;totals.p+=+fd.p||0;totals.c+=+fd.c||0;totals.f+=+fd.f||0;totals.fi+=+fd.fi||0;
    MICRO_KEYS.forEach(mk=>{totals[mk]+=+fd[mk]||0;});
  }));
  const todaySupps=(log.supps_taken||[]);
  todaySupps.forEach(ts=>{
    const supp=S.supps.find(s=>s.id===ts.id);
    if(!supp)return;
    const r=ts.units||1;
    MICRO_KEYS.forEach(mk=>{totals[mk]+=(+supp[mk]||0)*r;});
  });
  return totals;
}

// 7-day and 30-day averages
function getNutriAvg(days){
  const recentLogs=S.nutri.slice(0,days);
  if(!recentLogs.length)return null;
  const sum={cal:0,p:0,c:0,f:0,fi:0,...Object.fromEntries(MICRO_KEYS.map(k=>[k,0]))};
  recentLogs.forEach(log=>{
    (log.meals||[]).forEach(m=>(m.foods||[]).forEach(fd=>{
      sum.cal+=+fd.cal||0;sum.p+=+fd.p||0;sum.c+=+fd.c||0;sum.f+=+fd.f||0;sum.fi+=+fd.fi||0;
      MICRO_KEYS.forEach(mk=>{sum[mk]+=+fd[mk]||0;});
    }));
  });
  const avg={};
  Object.keys(sum).forEach(k=>{avg[k]=Math.round(sum[k]/recentLogs.length*10)/10;});
  return avg;
}

// MODULE QR CODE — ISO 18004 + Reed-Solomon
// ═══════════════════════════════════════════
function qrMatrix(text){
  const bytes=[];
  for(let i=0;i<text.length;i++){
    const c=text.charCodeAt(i);
    if(c<128)bytes.push(c);
    else if(c<2048){bytes.push(192|(c>>6));bytes.push(128|(c&63));}
    else{bytes.push(224|(c>>12));bytes.push(128|((c>>6)&63));bytes.push(128|(c&63));}
  }
  const CAP=[19,34,55,80,108,136,154,192,230,271];
  const EC=[[7,1,19,0,0],[10,1,34,0,0],[15,1,55,0,0],[20,2,40,0,0],
    [26,2,54,0,0],[18,4,36,0,0],[20,4,40,0,0],[24,4,48,0,0],
    [30,5,46,0,0],[18,5,46,0,0]];
  let version=1;
  for(let v=0;v<CAP.length;v++){if(bytes.length<=CAP[v]){version=v+1;break;}}
  const [ecPerBlock]=EC[version-1];
  const n=17+4*version;
  const mat=Array.from({length:n},()=>new Array(n).fill(0));
  const fn=Array.from({length:n},()=>new Array(n).fill(false));
  function setMod(r,c,v){if(r>=0&&r<n&&c>=0&&c<n){mat[r][c]=v?1:0;fn[r][c]=true;}}
  function finder(tr,tc){
    for(let r=0;r<7;r++)for(let c=0;c<7;c++){
      setMod(tr+r,tc+c,(r===0||r===6||c===0||c===6||(r>=2&&r<=4&&c>=2&&c<=4))?1:0);
    }
    for(let i=-1;i<=7;i++){setMod(tr+7,tc+i,0);setMod(tr+i,tc+7,0);setMod(tr-1,tc+i,0);setMod(tr+i,tc-1,0);}
  }
  finder(0,0);finder(0,n-7);finder(n-7,0);
  for(let i=8;i<n-8;i++){if(!fn[6][i])setMod(6,i,i%2===0?1:0);if(!fn[i][6])setMod(i,6,i%2===0?1:0);}
  fn[4*version+9][8]=true;mat[4*version+9][8]=1;
  const FP=[[8,0],[8,1],[8,2],[8,3],[8,4],[8,5],[8,7],[8,8],[7,8],[5,8],[4,8],[3,8],[2,8],[1,8],[0,8]];
  FP.forEach(([r,c])=>{fn[r][c]=true;});
  for(let i=0;i<8;i++){fn[8][n-1-i]=true;fn[n-1-i][8]=true;}fn[n-8][8]=true;
  const ALN={2:[6,18],3:[6,22],4:[6,26],5:[6,30],6:[6,34],7:[6,22,38],8:[6,24,42],9:[6,28,46],10:[6,28,50]};
  if(version>=2&&ALN[version]){
    const ap=ALN[version];
    for(const ar of ap)for(const ac of ap){
      if(fn[ar][ac])continue;
      for(let dr=-2;dr<=2;dr++)for(let dc=-2;dc<=2;dc++){
        setMod(ar+dr,ac+dc,(Math.abs(dr)===2||Math.abs(dc)===2)?1:(dr===0&&dc===0)?1:0);
      }
    }
  }
  const GF_EXP=new Uint8Array(512);const GF_LOG=new Uint8Array(256);
  (function(){let x=1;for(let i=0;i<255;i++){GF_EXP[i]=x;GF_LOG[x]=i;x<<=1;if(x>255)x^=0x11D;}
    for(let i=255;i<512;i++)GF_EXP[i]=GF_EXP[i-255];})();
  const gfMul=(a,b)=>a&&b?GF_EXP[GF_LOG[a]+GF_LOG[b]]:0;
  function rsGen(ecLen){let g=[1];for(let i=0;i<ecLen;i++){const ng=new Array(g.length+1).fill(0);for(let j=0;j<g.length;j++){ng[j]^=g[j];ng[j+1]^=gfMul(g[j],GF_EXP[i]);}g=ng;}return g;}
  function rsEncode(data,ecLen){const gen=rsGen(ecLen);const res=[...data,...new Array(ecLen).fill(0)];for(let i=0;i<data.length;i++){const coef=res[i];if(!coef)continue;for(let j=1;j<gen.length;j++)res[i+j]^=gfMul(gen[j],coef);}return res.slice(data.length);}
  const bits=[];bits.push(0,1,0,0);const L=bytes.length;
  for(let i=7;i>=0;i--)bits.push((L>>i)&1);
  bytes.forEach(b=>{for(let i=7;i>=0;i--)bits.push((b>>i)&1);});
  while(bits.length<CAP[version-1]*8-4)bits.push(0);while(bits.length%8)bits.push(0);
  const PAD=[0xEC,0x11];let pi=0;
  while(bits.length<CAP[version-1]*8){const p=PAD[pi++%2];for(let i=7;i>=0;i--)bits.push((p>>i)&1);}
  const dataBytes=[];for(let i=0;i<bits.length;i+=8){let b=0;for(let j=0;j<8;j++)b=(b<<1)|bits[i+j];dataBytes.push(b);}
  const ecBytes=rsEncode(dataBytes,ecPerBlock);
  const allBits=[];[...dataBytes,...ecBytes].forEach(b=>{for(let i=7;i>=0;i--)allBits.push((b>>i)&1);});
  const REM=[0,7,7,7,7,7,0,0,0,0,0,0,0,0];for(let i=0;i<(REM[version-1]||0);i++)allBits.push(0);
  let bi=0;let up=true;
  for(let col=n-1;col>=1;col-=2){if(col===6)col--;for(let i=0;i<n;i++){const r=up?n-1-i:i;for(let dc=0;dc<2;dc++){const c=col-dc;if(fn[r][c])continue;const bit=bi<allBits.length?allBits[bi++]:0;mat[r][c]=bit^(((r+c)%2===0)?1:0);};}up=!up;}
  const FMT=[1,1,1,0,1,1,1,1,1,0,0,0,1,0,0];
  FP.forEach(([r,c],i)=>{mat[r][c]=FMT[i];});
  for(let i=0;i<8;i++)mat[n-1-i][8]=FMT[i];
  for(let i=8;i<15;i++)mat[8][n-15+i]=FMT[i];
  mat[4*version+9][8]=1;
  return mat;
}

function drawQRToCanvas(mat,canvas,size){
  const n=mat.length;
  const cell=size/(n+8);
  const off=cell*4;
  canvas.width=canvas.height=size;
  const ctx=canvas.getContext('2d');
  // Use current theme bg/fg
  const isDark=S.cfg.theme!=='light';
  ctx.fillStyle=isDark?'#ffffff':'#ffffff';ctx.fillRect(0,0,size,size);
  ctx.fillStyle='#000000';
  for(let r=0;r<n;r++)for(let c=0;c<n;c++){
    if(mat[r][c])ctx.fillRect(Math.round(off+c*cell),Math.round(off+r*cell),Math.ceil(cell),Math.ceil(cell));
  }
}

function renderQR(url, canvasId){
  const canvas=document.getElementById(canvasId);
  if(!canvas||!url)return;
  try{
    const mat=qrMatrix(url);
    drawQRToCanvas(mat,canvas,220);
  }catch(e){
    const ctx=canvas.getContext('2d');
    canvas.width=canvas.height=220;
    ctx.fillStyle='var(--bg2)';ctx.fillRect(0,0,220,220);
    ctx.fillStyle='var(--err)';ctx.font='12px sans-serif';ctx.fillText('URL trop longue',10,110);
  }
}

function downloadQR(canvasId){
  const canvas=document.getElementById(canvasId);if(!canvas)return;
  const a=document.createElement('a');
  a.download='fittracker-qr.png';
  a.href=canvas.toDataURL('image/png');
  a.click();
}

function saveAppUrl(){
  const url=document.getElementById('appUrlInput')?.value?.trim();
  if(!url){alert('Entre une URL');return;}
  S.cfg.appUrl=url;
  persist();
  // Re-render QR after short delay (canvas needs to be in DOM)
  render();
  setTimeout(()=>renderQR(url,'qrCanvas'),100);
}

// AJR ENGINE
// ═══════════════════════════════════════════

function calcBMR(w,h,age){
  // Harris-Benedict révisé (Mifflin-St Jeor)
  return Math.round(10*w + 6.25*h - 5*age + 5);
}

function getAJR(){
  const {profile,activity,weight:w,height:h,age,custom}=S.ajr;
  const af=ACTIVITY_FACTORS[activity]||1.725;
  const bmr=calcBMR(w,h,age);
  const tdee=Math.round(bmr*af);

  let kcal,prot,gluc,lip,fi;
  if(profile==='mass'){
    kcal=tdee+300;
    prot=Math.round(w*2);
    lip=Math.round(kcal*0.25/9);
    gluc=Math.round((kcal-prot*4-lip*9)/4);
    fi=35;
  } else if(profile==='trail'){
    kcal=tdee+150;
    prot=Math.round(w*1.6);
    gluc=Math.round(kcal*0.55/4);
    lip=Math.round(kcal*0.25/9);
    fi=40;
  } else if(profile==='public'){
    kcal=tdee;
    prot=Math.round(w*0.8);
    gluc=Math.round(kcal*0.5/4);
    lip=Math.round(kcal*0.3/9);
    fi=25;
  } else { // custom
    kcal=custom.kcal||tdee;
    prot=custom.prot||Math.round(w*1.8);
    gluc=custom.gluc||Math.round(kcal*0.45/4);
    lip=custom.lip||Math.round(kcal*0.25/9);
    fi=custom.fi||30;
  }

  // Micros AJR standards + sportif
  const micro={
    mg: profile==='mass'||profile==='trail'?420:375,   // mg
    zn: 11,         // mg
    fe: 9,          // mg (homme)
    ca: 1000,       // mg
    k:  3500,       // mg
    na: 2000,       // mg (limite)
    vd: 15,         // µg
    b12: 2.4,       // µg
    vc: profile==='trail'?120:110, // mg
    va: 900,        // µg
    b6: 1.7,        // mg
    b9: 400,        // µg
    ph: 700,        // mg
    se: 55,         // µg
  };

  return{kcal,prot,gluc,lip,fi,...micro};
}

// Today's nutrition totals including supplements
function getTodayTotals(){
  // Read directly from S.nutri — don't call gnl() to avoid creating empty logs
  const log=S.nutri.find(n=>n.date===today())||{meals:[],supps_taken:[]};
  const totals={cal:0,p:0,c:0,f:0,fi:0,...Object.fromEntries(MICRO_KEYS.map(k=>[k,0]))};
  (log.meals||[]).forEach(m=>(m.foods||[]).forEach(fd=>{
    totals.cal+=+fd.cal||0;totals.p+=+fd.p||0;totals.c+=+fd.c||0;totals.f+=+fd.f||0;totals.fi+=+fd.fi||0;
    MICRO_KEYS.forEach(mk=>{totals[mk]+=+fd[mk]||0;});
  }));
  const todaySupps=(log.supps_taken||[]);
  todaySupps.forEach(ts=>{
    const supp=S.supps.find(s=>s.id===ts.id);
    if(!supp)return;
    const r=ts.units||1;
    MICRO_KEYS.forEach(mk=>{totals[mk]+=(+supp[mk]||0)*r;});
  });
  return totals;
}

// 7-day and 30-day averages
function getNutriAvg(days){
  const recentLogs=S.nutri.slice(0,days);
  if(!recentLogs.length)return null;
  const sum={cal:0,p:0,c:0,f:0,fi:0,...Object.fromEntries(MICRO_KEYS.map(k=>[k,0]))};
  recentLogs.forEach(log=>{
    (log.meals||[]).forEach(m=>(m.foods||[]).forEach(fd=>{
      sum.cal+=+fd.cal||0;sum.p+=+fd.p||0;sum.c+=+fd.c||0;sum.f+=+fd.f||0;sum.fi+=+fd.fi||0;
      MICRO_KEYS.forEach(mk=>{sum[mk]+=+fd[mk]||0;});
    }));
  });
  const avg={};
  Object.keys(sum).forEach(k=>{avg[k]=Math.round(sum[k]/recentLogs.length*10)/10;});
  return avg;
}
